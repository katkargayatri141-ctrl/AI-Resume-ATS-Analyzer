<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Resume ATS Analyzer</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <div class="hero">

        <h1>🤖 AI Resume ATS Analyzer</h1>

        <p>Upload your resume to receive an ATS score and personalized AI feedback.</p>

    </div>

    <div class="upload-box">

        <input
            type="file"
            id="resume"
            accept=".pdf">

        <button id="analyzeBtn">
            Analyze Resume
        </button>

    </div>

    <div id="loading"></div>

    <div id="result"></div>

</div>

<script src="script.js"></script>

</body>

</html>
